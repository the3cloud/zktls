[workspace]
resolver = "2"
members = ["crates/listeners", "crates/recordable-tls"]

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
once_cell = "1.19.0"

rand_core = "0.6.4"
rustls = { version = "0.23.13", default-features = false, features = ["std"] }
rustls-rustcrypto = { git = "https://github.com/the3cloud/rustls-rustcrypto.git" }
